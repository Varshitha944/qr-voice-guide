<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>
<body>

<h2>Add Instructions</h2>

<form action="/add" method="POST">

<input
type="text"
name="language"
placeholder="Language"
required>

<br><br>

<textarea
name="content"
placeholder="Instruction"
required>
</textarea>

<br><br>

<button type="submit">
Save
</button>

</form>

<hr>

<h2>Existing Instructions</h2>

{% for row in data %}

<p>
<b>{{row[1]}}</b> :
{{row[2]}}
</p>

{% endfor %}

</body>
</html>
